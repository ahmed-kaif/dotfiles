window:
    padding:
        x: 5
        y: 5
    class:
        instance: Alacritty
        general: Alacritty
    opacity: 0.99

font:
    size: 13
    normal:
        family: Ubuntu Mono
        style: Medium
    bold:
        family: Ubuntu Mono
        style: bold

cursor:
    style:
        shape: Block
        blinking: On
    blink_interval: 750
# Colors (Night Owlish Light)
colors:
  bright:
    black: '#7a8181'
    blue: '#5ca7e4'
    cyan: '#00c990'
    green: '#49d0c5'
    magenta: '#697098'
    red: '#f76e6e'
    white: '#989fb1'
    yellow: '#dac26b'
  cursor:
    cursor: '#403f53'
    text: '#fbfbfb'
  normal:
    black: '#011627'
    blue: '#4876d6'
    cyan: '#08916a'
    green: '#49d0c5'
    magenta: '#403f53'
    red: '#d3423e'
    white: '#7a8181'
    yellow: '#daaa01'
  primary:
    background: '#ffffff'
    foreground: '#403f53'
  selection:
    background: '#f2f2f2'
    text: '#403f53'
draw_bold_text_with_bright_colors: true
key_bindings:
    - { key: Q,         mods: Control,                    action: Quit }
    - { key: Return,    mods: Control|Alt,                action: SpawnNewInstance}
    - { key: F,         mods: Control|Alt,                action: ToggleFullScreen}     
